# Thin pointer: the real stack definition lives in deploy/docker-compose.yml.
# Kept at the repo root so the documented quickstart (`docker compose up -d`
# from here) and existing deployments keep working unchanged — the project
# directory stays the repo root, so .env is found here and the pinned project
# name (`dockvault-vault`, set in the included file) keeps the same volumes.
# NB: `name:` must be pinned HERE too — a `name:` inside an included file does
# not propagate to the including project, and the volume names hang off it.
name: dockvault-vault

include:
  - deploy/docker-compose.yml
