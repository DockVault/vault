# Self-contained local stack for the vault service: the web/API process, the
# SFTP process, and the Postgres + Redis it depends on. The built image is
# tagged `dockvault-vault:latest` — the same image the container-manager is
# meant to deploy as a customer container.
#
# Secrets come from ./.env (generated by scripts/up.ps1). DATABASE_URL and
# REDIS_HOST are overridden here to point at the sidecars regardless of .env.

name: dockvault-vault

services:
  vault-db:
    image: postgres:15-alpine
    container_name: vault-db
    environment:
      POSTGRES_USER: sftp_user
      POSTGRES_PASSWORD: ${VAULT_DB_PASSWORD:-vault_local_dev_pw}
      POSTGRES_DB: sftp_db
    volumes:
      - vault_pg_data:/var/lib/postgresql/data
    # Hardening: read-only root fs (data in the volume) + no privilege escalation.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sftp_user -d sftp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vault-network
    restart: unless-stopped

  vault-redis:
    image: redis:7-alpine
    container_name: vault-redis
    # Hardening: read-only root fs (ephemeral cache -> /data is tmpfs) + no escalation.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vault-network
    restart: unless-stopped

  vault-api:
    build: .
    image: dockvault-vault:latest
    container_name: vault-api
    env_file:
      - .env
    environment:
      DOCKER_CONTAINER: "true"
      DATABASE_URL: postgresql://sftp_user:${VAULT_DB_PASSWORD:-vault_local_dev_pw}@vault-db:5432/sftp_db
      REDIS_HOST: vault-redis
      REDIS_PORT: "6379"
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      API_USE_HTTPS: "false"
      SFTP_HOST: 0.0.0.0
      SFTP_PORT: "2222"
      ENVIRONMENT: development
      # Hours a resumable chunked-upload session lives before its buffered chunks become
      # eligible for cleanup. Operators reclaim sooner via POST /api/maintenance/upload-sessions/cleanup.
      CHUNK_SESSION_TTL_HOURS: "24"
      # read-only root fs: the first-run setup wizard writes its state file; point it at a
      # writable path (tmpfs /app/run below) instead of the read-only app root.
      SETUP_STATE_FILE: /app/run/setup_state.json
    command: ["python", "api_server.py"]
    ports:
      - "8200:8000"
    depends_on:
      vault-db:
        condition: service_healthy
      vault-redis:
        condition: service_healthy
    volumes:
      - vault_storage:/app/storage
      - vault_logs:/app/logs
      - vault_keys:/app/keys
      # Admin-uploaded logo/favicon assets (A4). A named volume (not tmpfs) so the
      # brand survives a restart; the image pre-creates /app/brand as appuser so the
      # non-root process can write here under the read-only root fs.
      - vault_brand:/app/brand
    # Hardening: non-root (Dockerfile USER) + no escalation + read-only root fs.
    # storage/logs/keys/brand are volumes; /app/certs (unmounted), /app/run (setup-wizard
    # state), /app/deployments (wizard-written .env/lock), + /tmp ride tmpfs.
    # mode=1777 so the non-root app (uid 10001) can write these even on a Linux
    # Docker engine that defaults compose tmpfs mounts to root-owned 0755
    # (Docker Desktop defaults to 1777, so this is a no-op there).
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /app/certs:mode=1777
      - /app/run:mode=1777
      - /app/deployments:mode=1777
    networks:
      - vault-network
    restart: unless-stopped

  vault-sftp:
    image: dockvault-vault:latest
    container_name: vault-sftp
    env_file:
      - .env
    environment:
      DOCKER_CONTAINER: "true"
      DATABASE_URL: postgresql://sftp_user:${VAULT_DB_PASSWORD:-vault_local_dev_pw}@vault-db:5432/sftp_db
      REDIS_HOST: vault-redis
      REDIS_PORT: "6379"
      SFTP_HOST: 0.0.0.0
      SFTP_PORT: "2222"
      ENVIRONMENT: development
      SETUP_STATE_FILE: /app/run/setup_state.json  # read-only root fs: writable state path
    command: ["python", "sftp_server.py"]
    # This service runs SFTP, not the HTTP API. Check the port is bound via
    # /proc (port 2222 = hex 08AE) instead of opening a socket — a raw TCP
    # connect makes paramiko log "Error reading SSH protocol banner" on every
    # probe.
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':08AE' /proc/net/tcp"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "2322:2222"
    depends_on:
      vault-db:
        condition: service_healthy
      vault-redis:
        condition: service_healthy
      vault-api:
        # Wait until the API is HEALTHY (its /health passes), not merely started, so the
        # API's startup migrations (which add enc_name/name_bi etc. that SFTP queries)
        # have run before SFTP serves. Mirrors run_combined.py's /health gate in prod.
        # vault-api inherits the image HEALTHCHECK (/health), so service_healthy applies.
        condition: service_healthy
    volumes:
      - vault_storage:/app/storage
      - vault_keys:/app/keys
    # Hardening: non-root (Dockerfile USER) + no escalation + read-only root fs.
    # storage/keys are volumes; this service doesn't mount the logs volume, so
    # /app/logs (+ /app/certs, /app/run + /app/deployments wizard state, /tmp) ride tmpfs.
    # mode=1777 so the non-root app can write on a Linux engine (see vault-api).
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /app/logs:mode=1777
      - /app/certs:mode=1777
      - /app/run:mode=1777
      - /app/deployments:mode=1777
    networks:
      - vault-network
    restart: unless-stopped

volumes:
  vault_pg_data:
  vault_storage:
  vault_logs:
  vault_keys:
  vault_brand:

networks:
  vault-network:
    driver: bridge
