name: Release

# Build the DockVault image, publish it to GHCR, and cut a GitHub Release when a version tag is
# pushed:  git tag v0.6.0 && git push origin v0.6.0
# The image self-reports the tag version (APP_VERSION build-arg -> /version + /info). The compose
# files keep their `build:` path, so from-source users are unaffected; this just adds a prebuilt
# image for the fast `docker compose pull` upgrade path (README "Upgrading").
#
# Third-party actions are pinned to a full commit SHA (supply-chain hardening); the trailing
# comment records the human-readable version. Bump both together when updating an action.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Resolve version + image name
        id: meta
        run: |
          ref="${GITHUB_REF_NAME:-}"
          ver="${ref#v}"
          if [ -z "$ver" ] || ! printf '%s' "$ver" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            ver="$(cat VERSION)"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vault" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:v${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest

      # Only cut a Release for an actual tag push (skipped on a manual workflow_dispatch build).
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
