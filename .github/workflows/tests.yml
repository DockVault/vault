name: Tests

# Run strict collection and the offline lane before any image build or browser install.
# The full job then exercises the same-commit image over the real Postgres, Redis, API,
# browser, and SFTP stack. Every credential is generated for one disposable runner.

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch: {}
  workflow_call:
    inputs:
      expected_sha:
        description: Commit that every release gate must test
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    uses: ./.github/workflows/preflight.yml
    with:
      expected_sha: ${{ inputs.expected_sha }}
    permissions:
      contents: read
  integration:
    name: Full suite (API + browser + SFTP)
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.expected_sha || github.sha }}
          persist-credentials: false

      - name: Verify requested commit
        if: ${{ inputs.expected_sha != '' }}
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            tests/requirements-test.lock

      - name: Generate and mask throwaway credentials
        shell: bash
        run: |
          set -euo pipefail
          ENCRYPTION_KEY="$(python -c 'import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')"
          JWT_SECRET_KEY="$(openssl rand -hex 32)"
          VAULT_DB_PASSWORD="$(openssl rand -hex 16)"
          ADMIN_PASSWORD="$(openssl rand -base64 24)"
          for value in "$ENCRYPTION_KEY" "$JWT_SECRET_KEY" "$VAULT_DB_PASSWORD" "$ADMIN_PASSWORD"; do
            echo "::add-mask::${value}"
          done
          {
            echo "ENCRYPTION_KEY=${ENCRYPTION_KEY}"
            echo "JWT_SECRET_KEY=${JWT_SECRET_KEY}"
            echo "VAULT_DB_PASSWORD=${VAULT_DB_PASSWORD}"
            echo "ADMIN_USERNAME=admin"
            echo "ADMIN_EMAIL=admin@dockvault-ci.com"
            echo "ADMIN_PASSWORD=${ADMIN_PASSWORD}"
            echo "API_USE_HTTPS=false"
            echo "ENVIRONMENT=development"
            echo "JWT_ACCESS_TOKEN_EXPIRE_MINUTES=240"
            echo "RATE_LIMIT_LOGIN_ATTEMPTS=2000"
            echo "RATE_LIMIT_VAULT_ATTEMPTS=2000"
            echo "RATE_LIMIT_VAULT_ATTEMPTS_ADMIN=2000"
            echo "RATE_LIMIT_API_DEFAULT=100000"
            echo "RATE_LIMIT_API_AUTH=100000"
            echo "RATE_LIMIT_API_UPLOAD=100000"
            echo "RATE_LIMIT_API_DOWNLOAD=100000"
          } > .env
          {
            echo "VAULT_ADMIN_USER=admin"
            echo "VAULT_ADMIN_PASS=${ADMIN_PASSWORD}"
            echo "VAULT_API_CONTAINER=vault-api"
            echo "VAULT_DB_CONTAINER=vault-db"
            echo "VAULT_REDIS_CONTAINER=vault-redis"
            echo "VAULT_SFTP_HOST=127.0.0.1"
            echo "VAULT_SFTP_PORT=2322"
            echo "VAULT_SAME_COMMIT_CI=1"
          } >> "$GITHUB_ENV"

      - name: Build the image and start the stack
        run: docker compose up -d --build

      - name: Wait for the API health gate
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            body=""
            if body="$(curl -fsS --max-time 5 http://127.0.0.1:8200/health 2>/dev/null)"; then
              case "$body" in
                *'"database":"connected"'*)
                  echo "Vault healthy after ${attempt} attempt(s): ${body}"
                  exit 0
                  ;;
              esac
            fi
            sleep 5
          done
          echo "::error::Vault never reported healthy at http://127.0.0.1:8200/health"
          docker compose ps
          docker compose logs --no-color --tail=200
          exit 1

      - name: Wait for the SFTP banner
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            banner=""
            if banner="$(timeout 5 bash -c 'exec 3<>/dev/tcp/127.0.0.1/2322; head -c 4 <&3' 2>/dev/null)"; then
              case "$banner" in
                SSH-*)
                  echo "SFTP greeting received after ${attempt} attempt(s)"
                  exit 0
                  ;;
              esac
            fi
            sleep 2
          done
          echo "::error::SFTP never presented an SSH banner on 127.0.0.1:2322"
          docker compose logs --no-color --tail=200 vault-sftp
          exit 1

      - name: Install locked test dependencies and Chromium
        run: |
          set -euo pipefail
          python -m pip install -r tests/requirements-test.lock
          python -m pip install --force-reinstall --require-hashes -r requirements.lock
          python -m pip check
          python -m playwright install --with-deps chromium

      - name: Verify Chromium launches against the API
        run: |
          python - <<'PY'
          from playwright.sync_api import sync_playwright

          with sync_playwright() as playwright:
              browser = playwright.chromium.launch(headless=True)
              page = browser.new_page()
              response = page.goto(
                  "http://127.0.0.1:8200/",
                  wait_until="domcontentloaded",
                  timeout=15_000,
              )
              if response is None or not response.ok:
                  raise SystemExit("Chromium could not load the running vault")
              browser.close()
          PY

      - name: Run the full test suite
        run: python -m pytest --maxfail=1 --junitxml=pytest-results.xml

      - name: Audit the successful full report
        run: >-
          python .github/scripts/pytest_result_audit.py pytest-results.xml
          --expected-total "${{ needs.preflight.outputs.test-count }}"

      - name: Exercise login throttling and Redis outage fallback
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/^RATE_LIMIT_LOGIN_ATTEMPTS=.*/RATE_LIMIT_LOGIN_ATTEMPTS=5/' .env
          docker compose up -d --force-recreate vault-api
          for attempt in $(seq 1 40); do
            body=""
            if body="$(curl -fsS --max-time 5 http://127.0.0.1:8200/health 2>/dev/null)"; then
              case "$body" in
                *'"database":"connected"'*) break ;;
              esac
            fi
            if [ "$attempt" -eq 40 ]; then
              echo "::error::vault-api did not return after restoring shipped limits"
              exit 1
            fi
            sleep 3
          done
          docker compose exec -T vault-redis redis-cli FLUSHALL
          VAULT_REDIS_OUTAGE_TEST=1 \
          VAULT_REDIS_CONTAINER=vault-redis \
            python -m pytest tests/test_login_throttle.py --maxfail=1

      - name: Container logs
        if: failure()
        run: docker compose logs --no-color --tail=400

      - name: Tear the stack down
        if: always()
        run: docker compose down -v --remove-orphans
