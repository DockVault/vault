# HTTPS-only variant of deploy/docker-compose.yml for a STANDALONE deployment of the
# vault service (e.g. a personal Azure VM) with no unencrypted listener at all:
#   - the web UI/API terminates TLS INSIDE the container (uvicorn ssl,
#     API_USE_HTTPS=true) and is published on host port 443 only;
#   - SFTP (SSH — already an encrypted protocol) is optional; in the DEFAULT combined
#     mode it runs inside the single container (opt in with RUN_SFTP=1), published on
#     host port 2322;
#   - Postgres and Redis are internal-only on the compose bridge network
#     (never published to the host).
#
# Deployment mode (COMPOSE_PROFILES in .env — exactly one; dockvault.py setup writes it,
# .env.example ships it):
#   combined (default): ONE container ('vault', run_combined.py) serves web + (RUN_SFTP=1) SFTP.
#   split             : TWO containers ('vault-api' + 'vault-sftp') over the same volumes.
#
# Setup: from the repository root run  python3 dockvault.py setup  — it
# collects the required settings, writes .env (secrets) at the repo root,
# generates certs/{cert.pem,key.pem} there, and starts this file. Manual start
# (from the repo root; the root docker-compose.secure.yml shim auto-loads ./.env):
#   docker compose -f docker-compose.secure.yml up --build -d --force-recreate --remove-orphans
#
# Differences from deploy/docker-compose.yml (the local dev stack):
#   - the app publishes 443:8000 (not 8200:8000) and runs with
#     API_USE_HTTPS=true + a ./certs bind mount at /app/certs (read-only) —
#     so /app/certs is NOT on tmpfs here;
#   - the healthcheck probes https:// (the image HEALTHCHECK probes plain
#     http:// and would fail forever against a TLS listener);
#   - ENVIRONMENT=production (disables /docs, /redoc, /openapi.json);
#   - VAULT_DB_PASSWORD has NO dev default — it must come from ./.env.
#
# Same project name as the dev compose ON PURPOSE: the fixed container_names
# collide, so the two stacks can never run side by side on one host.

name: dockvault-vault

services:
  vault-db:
    image: postgres:15-alpine@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f
    container_name: vault-db
    environment:
      POSTGRES_USER: sftp_user
      POSTGRES_PASSWORD: ${VAULT_DB_PASSWORD:?missing - run 'python3 dockvault.py setup' (writes .env)}
      POSTGRES_DB: sftp_db
    volumes:
      - vault_pg_data:/var/lib/postgresql/data
    # Hardening: read-only root fs (data in the volume) + no privilege escalation.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sftp_user -d sftp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Resource ceiling (no cap_drop: the official postgres entrypoint starts as root to chown the
    # data dir + su-exec to the postgres user).
    mem_limit: 1g
    pids_limit: 256
    networks:
      - vault-network
    restart: unless-stopped

  vault-redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: vault-redis
    environment:
      # Optional Redis AUTH — set REDIS_PASSWORD in .env to require it on the shared cache. Empty
      # (default) is a no-op. The app authenticates with the same REDIS_PASSWORD (config.redis_password).
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    # Array command keeps the entrypoint's drop to the unprivileged redis user; empty password = no auth.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-}"]
    # Hardening: read-only root fs (ephemeral cache -> /data is tmpfs) + no escalation.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /data
    healthcheck:
      # AUTH-aware: redis-cli -a "" skips AUTH on a no-password server, so this works either way.
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-}\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    pids_limit: 128
    networks:
      - vault-network
    restart: unless-stopped

  # DEFAULT (combined) mode — COMPOSE_PROFILES=combined: ONE container runs BOTH the
  # web/API (HTTPS on 443) and, when RUN_SFTP=1, the SFTP server (2322) via run_combined.py
  # (the image's default CMD). This is the recommended self-host layout — one container, one
  # shared storage/keys volume, one restart policy. For two separate containers instead, set
  # COMPOSE_PROFILES=split (activates vault-api + vault-sftp below). Exactly ONE of
  # {combined, split} must be in COMPOSE_PROFILES; dockvault.py setup writes it (default
  # combined) and .env.example ships it.
  vault:
    profiles: ["combined"]
    build:
      context: ..
      dockerfile: Dockerfile
    image: ${DOCKVAULT_IMAGE:-dockvault-vault:latest}
    container_name: vault
    env_file:
      - ../.env
    environment:
      DOCKER_CONTAINER: "true"
      DATABASE_URL: postgresql://sftp_user:${VAULT_DB_PASSWORD:?missing - run 'python3 dockvault.py setup' (writes .env)}@vault-db:5432/sftp_db
      REDIS_HOST: vault-redis
      REDIS_PORT: "6379"
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      # TLS terminates in-process (uvicorn) — no plain-HTTP listener exists.
      API_USE_HTTPS: "true"
      API_SSL_CERTFILE: /app/certs/cert.pem
      API_SSL_KEYFILE: /app/certs/key.pem
      SFTP_HOST: 0.0.0.0
      SFTP_PORT: "2222"
      # Run the SFTP server in THIS same container? Default OFF (web only). Set RUN_SFTP=1 in
      # .env (dockvault.py setup does this when you enable SFTP) to also serve SFTP on 2322.
      # run_combined.py supervises both processes and exits if either dies (the restart policy
      # then recreates the whole container).
      RUN_SFTP: ${RUN_SFTP:-}
      ENVIRONMENT: production
      CHUNK_SESSION_TTL_HOURS: "24"
    command: ["python", "run_combined.py"]
    ports:
      # HTTPS on ${WEB_HOST_PORT:-443} + SFTP on ${SFTP_HOST_PORT:-2322} (only actually served when
      # RUN_SFTP=1 — nothing binds 2222 in-container otherwise, so the mapping is inert). Set
      # WEB_HOST_PORT / SFTP_HOST_PORT in .env to publish on a different host port (the container
      # keeps 8000/2222); dockvault.py can pick free ports for you.
      - "${WEB_HOST_PORT:-443}:8000"
      - "${SFTP_HOST_PORT:-2322}:2222"
    depends_on:
      vault-db:
        condition: service_healthy
      vault-redis:
        condition: service_healthy
    volumes:
      - vault_storage:/app/storage
      - vault_logs:/app/logs
      - vault_keys:/app/keys
      - vault_brand:/app/brand
      # Certs generated by dockvault.py setup into the REPO-ROOT certs/ dir (read-only bind).
      - ../certs:/app/certs:ro
    # Probes the WEB half over https (the image HEALTHCHECK probes plain http and would fail
    # against a TLS listener). NOTE: this does NOT cover the SFTP half — an SFTP-only failure
    # is caught by run_combined.py's supervisor (it exits if either child dies), not here.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, ssl; ctx = ssl.create_default_context(); ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE; urllib.request.urlopen('https://localhost:8000/health', context=ctx)"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    # Same hardening as the split vault-api (non-root, read-only root fs, dropped caps + the
    # entrypoint's root-phase needs). storage/logs/keys/brand are volumes, /app/certs a
    # read-only bind; /tmp rides tmpfs with mode=1777 so the non-root app can write there.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    # Runs both halves; the web download path materialises a decrypted file in RAM (~2x
    # max_file_size_mb), so keep mem_limit well above that. Raise it if you serve large files
    # over both web and SFTP concurrently.
    mem_limit: 4g
    pids_limit: 512
    cpus: 2.0
    networks:
      - vault-network
    restart: unless-stopped

  vault-api:
    # SPLIT mode (COMPOSE_PROFILES=split): the web/API as its OWN container, paired with
    # vault-sftp — independent scaling / restart / resource limits vs the combined default,
    # at the cost of two containers sharing the storage+keys volume.
    profiles: ["split"]
    build:
      context: ..
      dockerfile: Dockerfile
    image: ${DOCKVAULT_IMAGE:-dockvault-vault:latest}
    container_name: vault-api
    env_file:
      - ../.env
    environment:
      DOCKER_CONTAINER: "true"
      DATABASE_URL: postgresql://sftp_user:${VAULT_DB_PASSWORD:?missing - run 'python3 dockvault.py setup' (writes .env)}@vault-db:5432/sftp_db
      REDIS_HOST: vault-redis
      REDIS_PORT: "6379"
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      # TLS terminates in-process (uvicorn ssl_certfile/ssl_keyfile,
      # app/api/api_server.py __main__ block) — no plain-HTTP listener exists.
      API_USE_HTTPS: "true"
      API_SSL_CERTFILE: /app/certs/cert.pem
      API_SSL_KEYFILE: /app/certs/key.pem
      SFTP_HOST: 0.0.0.0
      SFTP_PORT: "2222"
      # production disables the /docs, /redoc + /openapi.json endpoints.
      ENVIRONMENT: production
      # Hours a resumable chunked-upload session lives before its buffered chunks become
      # eligible for cleanup. Operators reclaim sooner via POST /api/maintenance/upload-sessions/cleanup.
      CHUNK_SESSION_TTL_HOURS: "24"
    command: ["python", "-m", "app.api.api_server"]
    ports:
      # The ONLY published web port: HTTPS on ${WEB_HOST_PORT:-443}. The container process stays
      # unprivileged (binds 8000 as uid 10001); Docker maps the host port onto it.
      - "${WEB_HOST_PORT:-443}:8000"
    depends_on:
      vault-db:
        condition: service_healthy
      vault-redis:
        condition: service_healthy
    volumes:
      - vault_storage:/app/storage
      - vault_logs:/app/logs
      - vault_keys:/app/keys
      # Admin-uploaded logo/favicon assets (served from /brand-assets/). A named
      # volume (not tmpfs) so the brand survives a restart; the image pre-creates
      # /app/brand as appuser so the non-root process can write here under the
      # read-only root fs. Without this, admin brand-asset uploads fail on a secure deploy.
      - vault_brand:/app/brand
      # Certs generated by dockvault.py setup into the REPO-ROOT certs/ dir; must be
      # readable by uid 10001 (the script chowns them). Read-only: renewals
      # replace the files on the host, then `docker compose restart vault-api`
      # (uvicorn does not hot-reload certs). Path is relative to THIS file (deploy/).
      - ../certs:/app/certs:ro
    # The image HEALTHCHECK probes http://localhost:8000/health, which a TLS
    # listener rejects — override it to probe https. Verification is disabled
    # because the cert may be self-signed and its SAN is the public name, not
    # localhost; this is a same-container liveness probe, not a trust decision.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, ssl; ctx = ssl.create_default_context(); ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE; urllib.request.urlopen('https://localhost:8000/health', context=ctx)"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    # Hardening: non-root (Dockerfile USER) + no escalation + read-only root fs.
    # storage/logs/keys are volumes and /app/certs is a read-only bind mount
    # (not tmpfs here, unlike the dev compose); /tmp rides tmpfs. mode=1777 is
    # required for the non-root app on engines that default tmpfs to root-owned 0755.
    security_opt:
      - no-new-privileges:true
    # Drop ALL caps, add back only the entrypoint's root-phase needs (chown volumes + setuid/setgid
    # drop to appuser uid 10001); the workload then runs as appuser with no effective caps. Removes
    # the risky defaults (NET_RAW, MKNOD, SYS_CHROOT, SETFCAP, ...).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    # Resource ceilings so one vault can't exhaust the host (co-tenant DoS). The download path
    # materialises the whole decrypted file in RAM (legacy Fernet codec briefly ~2x), so mem_limit
    # stays comfortably above ~2x max_file_size_mb (default 1024 MB) + concurrency; size per plan tier.
    mem_limit: 4g
    pids_limit: 512
    cpus: 2.0
    networks:
      - vault-network
    restart: unless-stopped

  vault-sftp:
    # SPLIT mode (COMPOSE_PROFILES=split): the SFTP server as its own container, paired with
    # vault-api. SFTP is SSH (already encrypted transport), published on host port 2322.
    # (In the DEFAULT combined mode, SFTP runs inside the single `vault` container via
    # RUN_SFTP=1 instead — you do not need split just to get SFTP.)
    profiles: ["split"]
    image: ${DOCKVAULT_IMAGE:-dockvault-vault:latest}
    container_name: vault-sftp
    env_file:
      - ../.env
    environment:
      DOCKER_CONTAINER: "true"
      DATABASE_URL: postgresql://sftp_user:${VAULT_DB_PASSWORD:?missing - run 'python3 dockvault.py setup' (writes .env)}@vault-db:5432/sftp_db
      REDIS_HOST: vault-redis
      REDIS_PORT: "6379"
      SFTP_HOST: 0.0.0.0
      SFTP_PORT: "2222"
      ENVIRONMENT: production
    command: ["python", "-m", "app.sftp.sftp_server"]
    # This service runs SFTP, not the HTTP API. Check the port is bound via
    # /proc (port 2222 = hex 08AE) instead of opening a socket — a raw TCP
    # connect makes paramiko log "Error reading SSH protocol banner" on every
    # probe.
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':08AE' /proc/net/tcp"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      # HOST-side SFTP port is configurable via SFTP_HOST_PORT in .env (default
      # 2322); the container-internal port stays 2222 (the healthcheck greps
      # ':08AE' = 2222, and the app binds SFTP_PORT=2222 below). Set e.g.
      # SFTP_HOST_PORT=2200 in .env to avoid a clash and open it in the Azure NSG.
      - "${SFTP_HOST_PORT:-2322}:2222"
    depends_on:
      vault-db:
        condition: service_healthy
      vault-redis:
        condition: service_healthy
      vault-api:
        # Wait until the API is HEALTHY (its /health passes), not merely started, so the
        # API's startup migrations (which add enc_name/name_bi etc. that SFTP queries)
        # have run before SFTP serves. Mirrors run_combined.py's /health gate in prod.
        condition: service_healthy
    volumes:
      - vault_storage:/app/storage
      - vault_keys:/app/keys
    # Hardening: non-root (Dockerfile USER) + no escalation + read-only root fs.
    # storage/keys are volumes; this service doesn't mount the logs volume, so
    # /app/logs, /app/certs, and /tmp ride tmpfs.
    # mode=1777 for the same reason as vault-api above: a non-root process must be
    # able to write these on a Linux engine that defaults compose tmpfs to root:0755.
    security_opt:
      - no-new-privileges:true
    # Drop ALL caps, add back only the entrypoint's root-phase needs (chown volumes + setuid/setgid
    # drop to appuser); the SFTP workload then runs as appuser with no effective caps.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /app/logs:mode=1777
      - /app/certs:mode=1777
    # SFTP also streams large files; keep headroom above max_file_size_mb (see vault-api note).
    mem_limit: 2g
    pids_limit: 512
    cpus: 1.0
    networks:
      - vault-network
    restart: unless-stopped

volumes:
  # DockVault labels every named volume so the management tool (dockvault.py) can enumerate a
  # deployment's volumes as one atomic bundle:
  #   docker volume ls --filter label=com.dockvault.managed=true
  # Labels are applied when a volume is first CREATED; a pre-existing (unlabelled) volume keeps its
  # data and is adopted by the tool under the "default" bundle - additive metadata, never a data move.
  # bundle = DEPLOYMENT_ID from .env (defaults to "default" when unset), so a set stays grouped.
  #
  # The volume NAMES carry an explicit VAULT_VOLUME_PREFIX so the tool can keep MULTIPLE data sets
  # side by side (create-new / repoint to a backup set). The default prefix "dockvault-vault" makes
  # the names identical to the historical <project>_<volume> names, so existing deployments are
  # untouched. Switching the prefix (in .env) points the stack at a DIFFERENT set - always paired
  # with its own .env (the .env holds that set's secrets).
  vault_pg_data:
    name: ${VAULT_VOLUME_PREFIX:-dockvault-vault}_vault_pg_data
    labels:
      com.dockvault.managed: "true"
      com.dockvault.role: "pg"
      com.dockvault.bundle: "${DEPLOYMENT_ID:-default}"
  vault_storage:
    name: ${VAULT_VOLUME_PREFIX:-dockvault-vault}_vault_storage
    labels:
      com.dockvault.managed: "true"
      com.dockvault.role: "storage"
      com.dockvault.bundle: "${DEPLOYMENT_ID:-default}"
  vault_logs:
    name: ${VAULT_VOLUME_PREFIX:-dockvault-vault}_vault_logs
    labels:
      com.dockvault.managed: "true"
      com.dockvault.role: "logs"
      com.dockvault.bundle: "${DEPLOYMENT_ID:-default}"
  vault_keys:
    name: ${VAULT_VOLUME_PREFIX:-dockvault-vault}_vault_keys
    labels:
      com.dockvault.managed: "true"
      com.dockvault.role: "keys"
      com.dockvault.bundle: "${DEPLOYMENT_ID:-default}"
  vault_brand:
    name: ${VAULT_VOLUME_PREFIX:-dockvault-vault}_vault_brand
    labels:
      com.dockvault.managed: "true"
      com.dockvault.role: "brand"
      com.dockvault.bundle: "${DEPLOYMENT_ID:-default}"

networks:
  vault-network:
    driver: bridge
