[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-config --strict-markers --base-url=http://localhost:8200
markers =
    unit: tests that do not require a running DockVault deployment
    integration: tests that require a running DockVault deployment
    docker: tests that create throwaway Docker containers or volumes
    ui: browser-driven end-to-end tests (Playwright); slower, need Chromium installed
    websocket: tests that open the /ws/monitor websocket
    sftp: tests that connect to the live SFTP service
    slow: longer-running tests
# Playwright: run headless by default (pass --headed to watch the browser)
